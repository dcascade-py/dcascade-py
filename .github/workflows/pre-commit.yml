name: Pre-Commit Checks

on:
  push:
    branches:
      #- main
      - github_actions  # or whatever branch you're pushing to
  pull_request:
    branches:
      #- main  # trigger on PRs as well
      - github_actions

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11.3'  # Use the appropriate Python version for your project

      # Step 3: Install pre-commit
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      # Step 4: Run pre-commit hooks on all files
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure || true  # Ensure the pipeline doesn't fail here
      
      - name: Check for file changes (detect if pre-commit modified files)
        run: |
          git diff --exit-code || touch changes_detected  # Mark if changes are detected

      - name: Commit changes if any (only commit if changes are detected)
        if: exists('changes_detected')
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: apply pre-commit fixes" || echo "No changes to commit"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes back to the branch
        if: exists('changes_detected')
        run: |
          git push origin ${{ github.head_ref }}
